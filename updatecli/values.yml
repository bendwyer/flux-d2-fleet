---
github:
  owner: bendwyer
  repository: flux-d2-fleet

images:
  # >=1.x — auto-merge patch+minor, manual PR for major
  - name: goldilocks
    image: docker.io/fairwinds/goldilocks
    tagfilter: '^v\d+\.\d+\.\d+$'
    safe: ">=4.14.0 <5.0.0"
    breaking: ">=5.0.0"
    needs_digest: false
    tenants:
      - name: home
        key: goldilocks_image
      - name: omni
        key: goldilocks_image

  - name: homepage
    image: ghcr.io/gethomepage/homepage
    tagfilter: '^v\d+\.\d+\.\d+$'
    safe: ">=1.11.0 <2.0.0"
    breaking: ">=2.0.0"
    needs_digest: true
    tenants:
      - name: home
        key: homepage_image
      - name: omni
        key: homepage_image

  - name: filebrowser
    image: docker.io/filebrowser/filebrowser
    tagfilter: '^v\d+\.\d+\.\d+$'
    safe: ">=2.56.0 <3.0.0"
    breaking: ">=3.0.0"
    needs_digest: false
    tenants:
      - name: home
        key: filebrowser_image

  - name: comictagger
    image: ghcr.io/bendwyer/containers/comictagger
    tagfilter: ""
    safe: ">=1.0.0 <2.0.0"
    breaking: ">=2.0.0"
    needs_digest: true
    tenants:
      - name: home
        key: comictagger_image

  - name: epub2cbz
    image: ghcr.io/bendwyer/containers/epub2cbz
    tagfilter: ""
    safe: ">=1.0.0 <2.0.0"
    breaking: ">=2.0.0"
    needs_digest: true
    tenants:
      - name: home
        key: epub2cbz_image

  - name: kcc
    image: ghcr.io/ciromattia/kcc
    tagfilter: '^v\d+\.\d+\.\d+$'
    safe: ">=9.4.0 <10.0.0"
    breaking: ">=10.0.0"
    needs_digest: false
    tenants:
      - name: home
        key: kcc_image

  - name: ebook-metadata
    image: ghcr.io/bendwyer/containers/ebook-metadata
    tagfilter: '^\d+\.\d+\.\d+$'
    safe: ">=1.0.0 <2.0.0"
    breaking: ">=2.0.0"
    needs_digest: false
    tenants:
      - name: home
        key: ebook_metadata_image

  - name: omni
    image: ghcr.io/siderolabs/omni
    tagfilter: '^v\d+\.\d+\.\d+$'
    safe: ">=1.4.0 <2.0.0"
    breaking: ">=2.0.0"
    needs_digest: false
    tenants:
      - name: omni
        key: omni_image

  # 0.x — auto-merge patch only, manual PR for minor
  - name: tsidp
    image: ghcr.io/tailscale/tsidp
    tagfilter: '^v\d+\.\d+\.\d+$'
    safe: ">=0.0.9 <0.1.0"
    breaking: ">=0.1.0"
    needs_digest: false
    tenants:
      - name: home
        key: tsidp_image

  - name: kavita
    image: lscr.io/linuxserver/kavita
    tagfilter: '^\d+\.\d+\.\d+$'
    safe: ">=0.8.0 <0.9.0"
    breaking: ">=0.9.0"
    needs_digest: true
    tenants:
      - name: home
        key: kavita_image

  - name: humble-cli
    image: ghcr.io/bendwyer/containers/humble-cli
    tagfilter: ""
    safe: ">=0.21.0 <0.22.0"
    breaking: ">=0.22.0"
    needs_digest: true
    tenants:
      - name: home
        key: humble_cli_image

  - name: kobodl
    image: ghcr.io/subdavis/kobodl
    tagfilter: '^\d+\.\d+\.\d+$'
    safe: ">=0.13.0 <0.14.0"
    breaking: ">=0.14.0"
    needs_digest: true
    tenants:
      - name: home
        key: kobodl_image
